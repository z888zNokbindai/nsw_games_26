        }

            color: #fff;
            margin: 0 0 0.5rem 0;

            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-slate-600 {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        /* Search Bar Box */

            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);

        .relative {

        /* Search Input */
        input[type="text"] {
            width: 100%;
            background-color: var(--bg-main);
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            font-size: 0.925rem;
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        input[type="text"]::placeholder {
            color: #4b5563;
        }

        .absolute {
            position: absolute;
            top: 50%;
            left: 1rem;
            transform: translateY(-50%);
            color: #4b5563;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        /* Stats Counter */
        .text-sm.text-slate-500 {
            color: var(--text-muted);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        #matchCount {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 1.1rem;
        }

        #totalCount {
            color: #fff;
            font-weight: 600;
        }

        /* Table Wrapper */
        .table-wrapper {
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .overflow-x-auto {
            overflow-x: auto;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: left;
        }

        th {
            background-color: var(--bg-th);
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            font-size: 0.9rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(30, 41, 66, 0.4);
        }

        .td-date {
            color: #e2e8f0;
            font-weight: 500;
            white-space: nowrap;
        }

        .td-title {
            color: #fff;
            font-weight: 400;

            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.025em;

            border: 1px solid rgba(14, 165, 233, 0.2) !important;

            color: #cbd5e1 !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;

            padding: 4rem 2rem;

            color: #4b5563;
        }

            margin: 0;
            font-size: 1rem;
        }

            width: 8px;
            height: 8px;

            background: var(--bg-main);

        document.getElementById('totalCount').textContent = gamesData.length;

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                document.getElementById('matchCount').textContent = 0;
                return;
            }
            
            emptyState.classList.add('hidden');
            document.getElementById('matchCount').textContent = data.length;

            const fragment = document.createDocumentFragment();
            data.forEach(item => {
                const tr = document.createElement('tr');
                
                let badgeClass = 'badge-other';
                if (item['หมายเหตุ / แพลตฟอร์ม'].includes('ดาวน์โหลด')) {
                    badgeClass = 'badge-download';
                } else if (item['หมายเหตุ / แพลตฟอร์ม'].includes('ตลับ')) {
                    badgeClass = 'badge-cartridge';
                }

                const platformBadge = `<span class="inline-flex ${badgeClass}">${item['หมายเหตุ / แพลตฟอร์ม']}</span>`;

                tr.innerHTML = `
                    <td class="td-date">${item['วันวางจำหน่าย'] || ''}</td>
                    <td class="td-title">${item['รายชื่อเกม'] || ''}</td>
                    <td>${platformBadge}</td>
                `;
                fragment.appendChild(tr);
            });
            tbody.appendChild(fragment);
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderTable(gamesData);
                return;
            }
            
            const filtered = gamesData.filter(item => {
                const date = (item['วันวางจำหน่าย'] || '').toLowerCase();
                const title = (item['รายชื่อเกม'] || '').toLowerCase();
                const platform = (item['หมายเหตุ / แพลตฟอร์ม'] || '').toLowerCase();
                return date.includes(query) || title.includes(query) || platform.includes(query);
            });
            
            renderTable(filtered);
        }

        // เริ่มเรนเดอร์ตารางทันทีที่โหลดหน้าเว็บเสร็จ
        renderTable(gamesData);
